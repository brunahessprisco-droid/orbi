<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ORBI — Convites</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#1A1A1B;color:#F2EDE4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#252324;border:1px solid rgba(242,237,228,0.08);border-radius:16px;padding:32px;width:100%;max-width:480px;}
h1{font-size:18px;font-weight:700;margin-bottom:4px;}
.sub{font-size:13px;color:#AAB7B7;margin-bottom:24px;}
label{display:block;font-size:12px;color:#AAB7B7;margin-bottom:4px;margin-top:12px;}
input{width:100%;background:#2F2D2E;border:1px solid rgba(242,237,228,0.12);border-radius:8px;padding:9px 12px;color:#F2EDE4;font-size:13px;font-family:inherit;outline:none;}
input:focus{border-color:#3dd9a5;}
.btn{display:block;width:100%;padding:12px;background:#3dd9a5;color:#111;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:20px;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:default;}
#result{display:none;margin-top:20px;}
.result-label{font-size:11px;color:#AAB7B7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
#codes{font-family:monospace;font-size:14px;line-height:2.2;color:#3dd9a5;background:#1A1A1B;border:1px solid rgba(61,217,165,0.15);border-radius:10px;padding:16px;}
.copy-btn{margin-top:10px;background:none;border:1px solid rgba(61,217,165,0.3);color:#3dd9a5;border-radius:8px;padding:7px 16px;font-family:inherit;font-size:12px;cursor:pointer;transition:background .15s;}
.copy-btn:hover{background:rgba(61,217,165,0.08);}
.status{font-size:12px;color:#AAB7B7;margin-top:8px;}
.err{color:#ff6b8a;}
</style>
</head>
<body>
<div class="card">
  <h1>Gerar Códigos de Convite</h1>
  <p class="sub">Cria códigos no Render — qualquer e-mail pode usar</p>

  <label>URL da API</label>
  <input id="url" value="https://orbi-api-b9ev.onrender.com/api">

  <label>Admin Secret</label>
  <input id="secret" type="password" value="orbi-admin-2025">

  <label>Quantidade</label>
  <input id="qty" type="number" value="20" min="1" max="100">

  <button class="btn" id="btn" onclick="gerar()">Gerar Códigos</button>

  <div id="result">
    <div class="result-label">Códigos criados</div>
    <div id="codes"></div>
    <button class="copy-btn" onclick="copiar()">Copiar todos</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script>
function randCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<10;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

async function gerar(){
  const btn=document.getElementById('btn');
  btn.disabled=true;
  btn.textContent='Criando...';
  const url=(document.getElementById('url').value||'').replace(/\/+$/,'');
  const secret=document.getElementById('secret').value.trim();
  const qty=Math.max(1,Math.min(100,parseInt(document.getElementById('qty').value)||20));

  const codes=[];
  const erros=[];

  for(let i=0;i<qty;i++){
    const code=randCode();
    btn.textContent=`Criando ${i+1}/${qty}...`;
    try{
      const r=await fetch(url+'/admin/create-invite',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({adminSecret:secret, code})
      });
      if(!r.ok) throw new Error(await r.text());
      codes.push(code);
    }catch(e){
      erros.push(code+' (erro: '+e.message+')');
    }
  }

  document.getElementById('codes').textContent=codes.join('\n');
  document.getElementById('result').style.display='block';
  document.getElementById('status').textContent=
    `✓ ${codes.length} criados${erros.length?' — '+erros.length+' erros':''}`;
  if(erros.length) document.getElementById('status').className='status err';

  btn.disabled=false;
  btn.textContent='Gerar Códigos';
}

function copiar(){
  const txt=document.getElementById('codes').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.copy-btn');
    b.textContent='Copiado!';
    setTimeout(()=>b.textContent='Copiar todos',2000);
  });
}
</script>
</body>
</html>
