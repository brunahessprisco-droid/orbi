<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Orbi</title>
<script>(function(){const t=localStorage.getItem('app_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
<link rel="icon" type="image/png" href="assets/Simbolo.png">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
[data-theme="dark"]{
  --body-bg:#1A1A1B;
  --bg:#1A1A1B;--surface:#252324;--surface2:#2F2D2E;--surface3:#3A3839;
  --border:rgba(242,237,228,0.08);--border2:rgba(242,237,228,0.16);
  --text:#F2EDE4;--muted:#AAB7B7;--hint:rgba(170,183,183,0.45);--shadow:rgba(0,0,0,0.6);
}
[data-theme="light"]{
  --body-bg:#F2EDE4;
  --bg:#F2EDE4;--surface:#FDFAF6;--surface2:#EDE8DF;--surface3:#DFD8CC;
  --border:rgba(62,74,89,0.1);--border2:rgba(62,74,89,0.2);
  --text:#1A1A1B;--muted:#3E4A59;--hint:#AAB7B7;--shadow:rgba(0,0,0,0.08);
}
:root{
  --green:#3dd9a5;--green-bg:rgba(61,217,165,0.12);--green-border:rgba(61,217,165,0.25);
  --red:#ff6b8a;--red-bg:rgba(255,107,138,0.12);--red-border:rgba(255,107,138,0.25);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--amber-border:rgba(245,158,11,0.25);
  --accent:#E98A73;--accent-bg:rgba(233,138,115,0.12);--accent-border:rgba(233,138,115,0.25);
  --sage:#87A28B;--sage-bg:rgba(135,162,139,0.12);--sage-border:rgba(135,162,139,0.25);
  --gold:#E7C489;--gold-bg:rgba(231,196,137,0.12);--gold-border:rgba(231,196,137,0.25);
  --purple:#E98A73;--purple-bg:rgba(233,138,115,0.12);--purple-border:rgba(233,138,115,0.25);
  --blue:#87A28B;--blue-bg:rgba(135,162,139,0.12);--blue-border:rgba(135,162,139,0.25);
  --pink:#AAB7B7;--pink-bg:rgba(170,183,183,0.12);--pink-border:rgba(170,183,183,0.25);
  /* per-module accent colors (match icon color) */
  --hab-c:#3E4A59;--hab-bg:rgba(62,74,89,0.15);--hab-border:rgba(62,74,89,0.3);
  --fin-c:#DDB883;--fin-bg2:rgba(221,184,131,0.12);--fin-border2:rgba(221,184,131,0.25);
  --ex-c:#87A28B;--ex-bg:rgba(135,162,139,0.12);--ex-border:rgba(135,162,139,0.25);
  --cas-c:#E98A73;--cas-bg:rgba(233,138,115,0.12);--cas-border:rgba(233,138,115,0.25);
  --ali-c:#87A28B;--ali-bg:rgba(135,162,139,0.12);--ali-border:rgba(135,162,139,0.25);
  --sau-c:#3E4A59;--sau-bg:rgba(62,74,89,0.15);--sau-border:rgba(62,74,89,0.3);
  --gcal-c:#4285f4;--gcal-bg:rgba(66,133,244,0.12);--gcal-border:rgba(66,133,244,0.25);
  --radius:16px;--radius-sm:10px;--mono:"DM Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Comfortaa",sans-serif;background:var(--body-bg);color:var(--text);min-height:100vh;font-size:14px;}
.nav{display:flex;align-items:center;height:56px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;gap:8px;position:sticky;top:0;z-index:40;}
.nav-brand{
  display: flex;
  align-items: center;
  gap: 10px;
  font-size:16px;
  font-weight:700;
  letter-spacing:-.3px;
  flex:1;
}

.nav-brand img{
  height: 28px;
  object-fit: contain;
}
.nav-tabs{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;}
.nav-tab{border:none;background:none;color:var(--muted);padding:6px 14px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-tab.active{background:var(--surface3);color:var(--text);}
.btn-theme{border:1px solid var(--border);background:none;color:var(--muted);width:32px;height:32px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
.btn-theme:hover{color:var(--text);}
[data-theme="dark"] .bi-sun-fill{display:none;}
[data-theme="light"] .bi-moon-stars-fill{display:none;}
.main{max-width:1680px;margin:0 auto;padding:28px 24px 40px;}
.page{display:none;}.page.active{display:block;}
.sistemas-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:32px;}
@media(max-width:900px){.sistemas-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:480px){.sistemas-grid{grid-template-columns:repeat(2,1fr);}}
.sis-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 12px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,transform .15s,background .15s;box-shadow:0 4px 16px var(--shadow);text-align:center;}
.sis-card:hover{transform:translateY(-3px);border-color:var(--border2);background:var(--surface2);}
.sis-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px;}
.sis-icon-img{width:44px;height:44px;object-fit:contain;}
.sis-name{font-size:12px;font-weight:600;letter-spacing:-.1px;color:var(--text);}
.quote{text-align:center;font-size:13px;color:var(--hint);font-style:italic;margin-bottom:28px;}
.hub-bottom{display:grid;grid-template-columns:2fr 4fr;gap:16px;align-items:start;}
.hub-today{display:flex;flex-direction:column;gap:12px;}
.hub-cal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 4px 16px var(--shadow);}
@media(max-width:900px){.hub-bottom{grid-template-columns:1fr;}}
.today-empty{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--hint);font-size:13px;box-shadow:0 4px 16px var(--shadow);}
.cal-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.cal-nav-label{font-size:15px;font-weight:600;min-width:160px;}
.btn-nav{border:1px solid var(--border);background:var(--surface2);color:var(--muted);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:11px;}
.btn-nav:hover{color:var(--text);}
.btn-nav-text{width:auto;padding:0 10px;font-family:inherit;font-size:11px;font-weight:600;}
.filter-group{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-left:auto;}
.filter-btn{border:none;background:none;color:var(--muted);padding:6px 10px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.filter-btn.active{background:var(--surface3);color:var(--text);}
.filter-btn img{width:18px;height:18px;object-fit:contain;opacity:.65;transition:opacity .15s;}
.filter-btn.active img{opacity:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);padding:6px 0;}
.cal-day{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px;min-height:90px;cursor:pointer;transition:border-color .15s,background .12s;position:relative;}
.cal-day:hover{border-color:var(--border2);background:var(--surface2);}
.cal-day.today{border-color:var(--green);background:var(--green-bg);}
.cal-day.other-month{opacity:.4;}
.cal-day.has-data{border-color:var(--border2);}
.cal-day-num{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.cal-day.today .cal-day-num{color:var(--green);font-weight:700;}
.cal-dots{display:flex;flex-direction:column;gap:2px;}
.cal-dot{font-size:10px;border-radius:4px;padding:1px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
.cal-dot.fin{background:var(--green-bg);color:var(--green);}
.cal-dot.fin.desp{background:var(--red-bg);color:var(--red);}
.cal-dot.fin.par{background:var(--gold-bg);color:var(--gold);}
.cal-dot.ex{background:var(--ex-bg);color:var(--ex-c);}
.cal-dot.cas{background:var(--cas-bg);color:var(--cas-c);}
.cal-dot.sau{background:var(--sau-bg);color:var(--sau-c);}
.cal-dot.hab{background:var(--hab-bg);color:var(--hab-c);}
.cal-dot.ali{background:var(--ali-bg);color:var(--ali-c);}
.cal-dot.gcal{background:var(--gcal-bg);color:var(--gcal-c);}
.popup-section-title.sau{color:var(--sau-c);}
.popup-section-title.hab{color:var(--hab-c);}
.popup-section-title.ali{color:var(--ali-c);}
.popup-item-val.amber{color:var(--gold);}
.popup-item-val.blue{color:var(--hab-c);}
.popup-sum-chip.sau{background:var(--sau-bg);color:var(--sau-c);border:1px solid var(--sau-border);}
.popup-sum-chip.hab{background:var(--hab-bg);color:var(--hab-c);border:1px solid var(--hab-border);}
.popup-sum-chip.ali{background:var(--ali-bg);color:var(--ali-c);border:1px solid var(--ali-border);}
.today-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 4px 16px var(--shadow);}
.today-date{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.today-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.today-nav-label{flex:1;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.today-nav-label span{color:var(--green);}
.btn-day-nav{border:1px solid var(--border);background:var(--surface2);color:var(--muted);width:24px;height:24px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;flex-shrink:0;}
.btn-day-nav:hover{color:var(--text);border-color:var(--border2);}
.btn-day-today{width:auto;padding:0 8px;font-family:inherit;font-size:10px;font-weight:600;}
.hub-filters{display:flex;justify-content:flex-end;margin-bottom:12px;}
.td-section{margin-bottom:14px;}
.td-section:last-child{margin-bottom:0;}
.td-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.td-sec-title.fin{color:var(--fin-c);}
.td-sec-title.ex{color:var(--ex-c);}
.td-sec-title.cas{color:var(--cas-c);}
.td-sec-title.sau{color:var(--sau-c);}
.td-sec-title.hab{color:var(--hab-c);}
.td-sec-title.ali{color:var(--ali-c);}
.td-sec-val{font-family:var(--mono);font-weight:400;font-size:10px;text-transform:none;letter-spacing:0;margin-left:auto;}
.td-habits{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.td-hab-group{display:flex;flex-direction:column;gap:4px;}
.td-hab-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);}
.td-hab-icons{display:flex;flex-wrap:wrap;gap:5px;}
.td-habit-icon{font-size:18px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:opacity .15s,transform .1s;}
.td-habit-icon:hover{transform:scale(1.12);}
.td-habit-icon.done{border-color:var(--hab-border);background:var(--hab-bg);}
.td-habit-icon.undone{opacity:.35;}
.td-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:7px;background:var(--surface2);margin-bottom:3px;gap:8px;font-size:12px;min-width:0;}
.td-item-time{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;min-width:32px;}
.td-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.td-item-mod-icon{width:14px;height:14px;object-fit:contain;flex-shrink:0;opacity:.85;}
.td-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-item-hint{color:var(--hint);font-size:10px;}
.td-divider{height:1px;background:var(--border);margin:6px 0;}
.td-val{font-family:var(--mono);font-size:11px;flex-shrink:0;}
.td-val.red{color:var(--red);}
.td-val.green{color:var(--green);}
.td-val.accent{color:var(--accent);}
.td-val.sage{color:var(--sage);}
.td-val.gold{color:var(--gold);}
.td-val.purple{color:var(--accent);}
.td-val.pink{color:var(--sage);}
.td-val.blue{color:var(--sage);}
.td-val.amber{color:var(--gold);}
.td-val.muted{color:var(--muted);}
.td-item.planned{opacity:.75;border:1px dashed var(--border2);}
.td-item-link{cursor:pointer;transition:background .12s;}
.td-item-link:hover{background:var(--surface);}
.td-item-planned-badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:1px 5px;border-radius:4px;flex-shrink:0;white-space:nowrap;}
.td-check-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--hint);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:background .12s,border-color .12s,color .12s;padding:0;font-family:inherit;}
.td-check-btn:hover{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.cal-more{font-size:10px;color:var(--hint);margin-top:2px;}
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.open{display:flex;}
.popup{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 60px var(--shadow);}
.popup-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.popup-title{font-size:16px;font-weight:700;}
.popup-date{font-size:12px;color:var(--muted);margin-top:2px;}
.btn-close{border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:4px;}
.popup-body{padding:16px 20px 20px;}
.popup-section{margin-bottom:18px;}
.popup-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.popup-section-title.fin{color:var(--fin-c);}
.popup-section-title.ex{color:var(--ex-c);}
.popup-section-title.cas{color:var(--cas-c);}
.popup-item-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--hint);padding:6px 2px 2px;margin-bottom:2px;}
.popup-item{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:8px;background:var(--surface2);margin-bottom:4px;gap:12px;font-size:12px;}
.popup-item-name{color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.popup-item-val{font-family:var(--mono);color:var(--muted);flex-shrink:0;font-size:11px;}
.popup-item-val.red{color:var(--red);}
.popup-item-val.green{color:var(--green);}
.popup-item-val.purple{color:var(--ex-c);}
.popup-item-val.pink{color:var(--cas-c);}
.popup-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.popup-sum-chip{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;}
.popup-sum-chip.fin{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.popup-sum-chip.ex{background:var(--ex-bg);color:var(--ex-c);border:1px solid var(--ex-border);}
.popup-sum-chip.cas{background:var(--cas-bg);color:var(--cas-c);border:1px solid var(--cas-border);}
.empty-day{text-align:center;padding:32px;color:var(--hint);font-size:13px;}
.auth-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.7);z-index:500;}
.auth-overlay.open{display:flex;}
.auth-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:28px;}
.auth-title{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px;}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.auth-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.auth-field input:focus{border-color:var(--green);}
.auth-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.auth-btn{padding:8px 20px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.auth-btn.primary{background:var(--green);color:#000;}
.auth-msg{margin-top:12px;font-size:12px;color:var(--red);}
.btn-avatar{border:1px solid var(--border);background:var(--green-bg);color:var(--green);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:inherit;transition:border-color .15s;}
.btn-avatar:hover{border-color:var(--green);}
.profile-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.7);z-index:500;}
.profile-overlay.open{display:flex;}
.profile-modal{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:0;overflow:hidden;}
.profile-header{padding:24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);}
.profile-avatar{width:52px;height:52px;border-radius:50%;background:var(--accent-bg);border:2px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent);flex-shrink:0;}
.profile-name{font-size:16px;font-weight:700;}
.profile-email{font-size:12px;color:var(--muted);margin-top:2px;}
.profile-close{margin-left:auto;border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;line-height:1;padding:4px;}
.profile-body{padding:20px;}
.profile-section{margin-bottom:20px;}
.profile-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:12px;}
.profile-field{margin-bottom:12px;}
.profile-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.profile-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;}
.profile-field input:focus{border-color:var(--green);}
.profile-btn{padding:9px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--green);color:#000;transition:opacity .15s;}
.profile-btn:hover{opacity:.85;}
.profile-btn.secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.profile-msg{font-size:12px;margin-top:10px;min-height:16px;}
.profile-msg.ok{color:var(--green);}
.profile-msg.err{color:var(--red);}
.profile-divider{border:none;border-top:1px solid var(--border);margin:0 0 20px;}
html.privacy .sensitive{filter:blur(8px);user-select:none;pointer-events:none;transition:filter .2s;}
.btn-eye{border:1px solid var(--border);background:none;color:var(--muted);width:32px;height:32px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;}
.btn-eye:hover{color:var(--text);}
.hub-filters{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:12px;}
</style>
</head>
<body>

<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">

<script>
const API_BASE_KEY='fin_api_base_v1';
const AUTH_KEY='fin_auth_token_v1';
function getApiBase(){return localStorage.getItem(API_BASE_KEY)||'https://orbi-api-b9ev.onrender.com/api';}

let AUTH_MODE = 'login';

function setAuthMode(mode){
  AUTH_MODE = mode;
  const isLogin = mode === 'login';
  document.getElementById('wrap-auth-name').style.display = isLogin ? 'none' : 'block';
  document.getElementById('wrap-auth-invite').style.display = isLogin ? 'none' : 'block';
  document.getElementById('auth-sub').textContent = isLogin ? 'Entre com seu e-mail e senha para continuar' : 'Crie sua conta com convite individual';
  document.getElementById('auth-submit-btn').textContent = isLogin ? 'Entrar' : 'Cadastrar';
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  tabLogin.style.background = isLogin ? 'var(--surface3)' : 'none';
  tabLogin.style.color = isLogin ? 'var(--text)' : 'var(--muted)';
  tabRegister.style.background = isLogin ? 'none' : 'var(--surface3)';
  tabRegister.style.color = isLogin ? 'var(--muted)' : 'var(--text)';
  document.getElementById('auth-msg').textContent = '';
}

async function submitAuth(){
  const nome = document.getElementById('auth-name')?.value.trim() || '';
  const email = document.getElementById('auth-email').value.trim().toLowerCase();
  const pass = document.getElementById('auth-pass').value;
  const inviteCode = document.getElementById('auth-invite')?.value.trim() || '';
  const apiInp = document.getElementById('auth-api').value.trim();
  const msg = document.getElementById('auth-msg');
  msg.textContent = '';
  if(!email || !pass){ msg.textContent = 'Preencha e-mail e senha.'; return; }
  if(AUTH_MODE === 'register' && !nome){ msg.textContent = 'Preencha o nome.'; return; }
  if(AUTH_MODE === 'register' && !inviteCode){ msg.textContent = 'Informe o código convite.'; return; }
  if(apiInp) localStorage.setItem(API_BASE_KEY, apiInp);
  msg.textContent = 'Conectando ao servidor...';
  try{
    const url = AUTH_MODE === 'login' ? `${getApiBase()}/auth/login` : `${getApiBase()}/auth/register`;
    const payload = AUTH_MODE === 'login' ? { email, senha: pass } : { nome, email, senha: pass, inviteCode };
    let r, data, lastErr;
    const delays = [0, 5000, 12000];
    for(let i = 0; i < delays.length; i++){
      if(delays[i]) { msg.textContent = `Servidor acordando, aguarde... (${i}/${delays.length-1})`; await new Promise(res=>setTimeout(res,delays[i])); }
      try{
        r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        data = await r.json();
        lastErr = null;
        break;
      }catch(e){ lastErr = e; }
    }
    if(lastErr) throw lastErr;
    if(!r.ok){
      const map = {
        INVALID_CREDENTIALS: 'Credenciais inválidas.',
        INVITE_CODE_NOT_FOUND: 'Código convite não encontrado.',
        INVITE_CODE_INACTIVE: 'Código convite inativo.',
        INVITE_CODE_ALREADY_USED: 'Esse código convite já foi usado.',
        INVITE_CODE_EMAIL_MISMATCH: 'Esse convite não corresponde a este e-mail.',
        EMAIL_ALREADY_EXISTS: 'Este e-mail já está cadastrado.'
      };
      msg.textContent = map[data.error] || data.error || 'Não foi possível continuar.';
      return;
    }
    localStorage.setItem(AUTH_KEY,data.token);
    if(data.user?.id) localStorage.setItem('hub_user_id',data.user.id);
    if(data.user?.nome) localStorage.setItem('hub_user_nome',data.user.nome);
    document.getElementById('auth-overlay').classList.remove('open');
    fetchFinancas();
    hubBootstrap().then(()=>loadProfileData());
  }catch(e){
    msg.textContent = 'Erro ao conectar à API.';
  }
}

async function logout(){
  if(!confirm('Tem certeza que deseja sair?')) return;
  if(typeof _hubActionQueue !== 'undefined' && _hubActionQueue){
    try{ await _hubActionQueue; }
    catch(e){ console.warn('[Hub] Erro ao aguardar fila antes do logout:', e); }
  }
  const _tok=localStorage.getItem(AUTH_KEY);
  if(_tok)try{ await Promise.race([fetch(getApiBase()+'/auth/logout',{method:'POST',headers:{Authorization:'Bearer '+_tok}}),new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),3000))]); }catch(_){}
  localStorage.removeItem(AUTH_KEY); localStorage.removeItem('hub_user_id'); localStorage.removeItem('hub_user_nome'); location.reload();
}
function toggleTheme(){ const isDark=document.documentElement.getAttribute('data-theme')==='dark'; const next=isDark?'light':'dark'; document.documentElement.setAttribute('data-theme',next); localStorage.setItem('app_theme',next); }
function applyPrivacy(){ const on=localStorage.getItem('app_privacy')==='1'; document.documentElement.classList.toggle('privacy',on); const btn=document.getElementById('btn-privacy'); if(btn)btn.innerHTML=on?'<i class="bi bi-eye-slash-fill"></i>':'<i class="bi bi-eye-fill"></i>'; }
function togglePrivacy(){ const on=localStorage.getItem('app_privacy')==='1'; localStorage.setItem('app_privacy',on?'0':'1'); applyPrivacy(); }
function showPage(id){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); }
// storage helpers – isolamento por usuário (hub_user_id é global)
function _lsGet(k){const uid=localStorage.getItem('hub_user_id')||'anon';const ns='u_'+uid+'_'+k;const v=localStorage.getItem(ns);if(v!==null)return v;const leg=localStorage.getItem(k);if(leg!==null){localStorage.setItem(ns,leg);localStorage.removeItem(k);}return leg;}
function _lsSet(k,v){const uid=localStorage.getItem('hub_user_id')||'anon';localStorage.setItem('u_'+uid+'_'+k,v);}

function updateHubSyncIndicator(){
  var label=document.getElementById('hub-sync-label');
  var btn=document.getElementById('hub-refresh-btn');
  if(!label||!btn)return;
  var uid=localStorage.getItem('hub_user_id')||'anon';
  var lastSync=localStorage.getItem('u_'+uid+'_hub_lastsync_v1');
  if(!lastSync){
    label.textContent='Nunca sincronizado';
    label.style.color='var(--red)';
    return;
  }
  var ago=Date.now()-Number(lastSync);
  var mins=Math.floor(ago/60000);
  var hours=Math.floor(ago/3600000);
  var txt='';
  var col='var(--green)';
  if(mins<1){txt='Atualizado agora';}
  else if(mins<5){txt='Atualizado ha '+mins+' min';}
  else if(mins<30){txt='Atualizado ha '+mins+' min';col='var(--amber)';}
  else if(hours<2){txt='Atualizado ha '+hours+' h';col='var(--amber)';}
  else{txt='Atualizado ha '+hours+' h - dados desatualizados';col='var(--red)';}
  label.textContent=txt;
  label.style.color=col;
}

function refreshHubData(){
  var icon=document.getElementById('hub-refresh-icon');
  if(icon)icon.textContent='⟳';
  hubBootstrap().finally(function(){
    if(icon)icon.textContent='↻';
    updateHubSyncIndicator();
  });
}
function loadTxs(){ try{return JSON.parse(_lsGet('hub_fin_cache')||'[]');}catch{return [];} }
function loadTreinos(){ try{return JSON.parse(_lsGet('saude_treinos_v1')||'[]');}catch{return [];} }
function loadTarefas(){ try{return JSON.parse(_lsGet('casinha_tarefas')||'[]');}catch{return [];} }
function loadSaude(){ try{const s=JSON.parse(_lsGet('saude_app_v1')||'null');return s||{weights:[],exams:[],consults:[]};}catch{return {weights:[],exams:[],consults:[]};} }
function loadHabitos(){ try{return JSON.parse(_lsGet('habitos_app_v5')||'[]');}catch{return [];} }
function hubIsPlannedForDate(h,dateStr){
  if(!h||!dateStr) return false;
  if(h.startDate&&dateStr<h.startDate) return false;
  const d=new Date(dateStr+'T12:00:00');
  const f=h.freq||'diario';
  if(f==='livre'||f==='diario') return true;
  if(f==='semanal') return (h.weekdays||[]).includes(d.getDay());
  if(f==='mensal'){
    const want=Math.max(1,Math.min(31,Number(h.monthDay)||1));
    const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return d.getDate()===Math.min(want,last);
  }
  return true;
}
function loadAlimentacao(){ try{return JSON.parse(_lsGet('alimentacao_meals_v3_light')||'[]');}catch{return [];} }
function loadMealPlan(){ try{return JSON.parse(_lsGet('alimentacao_plan_v3_light')||'{}');}catch{return {};} }
function getMealPlanForDate(dateStr){ const p=loadMealPlan(); for(const week of Object.values(p)){ if(Array.isArray(week)){const row=week.find(x=>x.date===dateStr); if(row)return row.slots||null;} } return null; }
function fmt(v){return 'R$ '+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtNum(v){return Number(v||0).toLocaleString('pt-BR',{maximumFractionDigits:0});}
function hIcon(icon){if(!icon)return'<i class="bi bi-stars"></i>';if(icon.startsWith('bi-'))return`<i class="bi ${icon}"></i>`;const d=document.createElement('span');d.textContent=icon;return d.outerHTML;}

async function hubBootstrap(){
  const token=localStorage.getItem(AUTH_KEY);
  const uid=localStorage.getItem('hub_user_id');
  const base=getApiBase();
  if(!token||!uid)return;
  let skipGcalIndicatorUpdate=false;
  const h=url=>fetch(`${base}${url}`,{headers:{Authorization:'Bearer '+token}}).then(r=>r.ok?r.json():null).catch(()=>null);
  try{
    const[rTre,rTar,rHab,rAli,rCfg,rW,rE,rC]=await Promise.all([
      h(`/treinos?usuario_id=${uid}`),
      h(`/casinha/tarefas?usuario_id=${uid}`),
      h(`/habitos?usuario_id=${uid}`),
      h(`/alimentacao/refeicoes?usuario_id=${uid}`),
      h(`/alimentacao/config?usuario_id=${uid}`),
      h('/health/weights'),
      h(`/saude/exames?usuario_id=${uid}`),
      h(`/saude/consultas?usuario_id=${uid}`),
    ]);
    const treinos=(Array.isArray(rTre)?rTre:[]).map(r=>{const rawObs=r.obs||'';const planejado=rawObs.startsWith('[PLAN]');const naoFeito=rawObs.startsWith('[SKIP]');const obs=planejado?rawObs.slice(6):naoFeito?rawObs.slice(6):rawObs;return{id:r.client_id,_dbId:r.id,data:(r.data||'').slice(0,10),hora_inicio:r.hora_inicio||'',titulo:r.titulo||'',nome:r.titulo||'',tipo_ex:r.tipo_ex||'',tipo_cat:r.tipo_cat||'cardio',local:r.local_nome||'',duracao:r.duracao,obs,planejado,naoFeito};});
    const tarefas=(Array.isArray(rTar)?rTar:[]).map(r=>({id:r.client_id,_dbId:r.id,titulo:r.titulo||'',status:r.status||'',ambiente:r.ambiente||'',pessoa:r.responsavel||'',prioridade:r.prioridade||'',tipo:r.tipo||'',dataVenc:r.data_venc||'',horario:r.horario||'',dataConclusao:r.data_conclusao||''}));

        weights:weights.filter(w=>!_delW.has(w.id)),
        exams:exams.filter(e=>!_delE.has(e.id)),
        consults:consults.filter(c=>!_delC.has(c.id)),
        doctors:[]
      }));
    }
    rendTodaySummary(); rendCal();
    const hubFetchAllOk=[rTre,rTar,rHab,rAli,rCfg,rW,rE,rC].every(function(v){return v!==null;});
    const _hubLsid='u_'+(localStorage.getItem('hub_user_id')||'anon')+'_hub_lastsync_v1';
    const _hubLbl=document.getElementById('hub-sync-label');
    if(hubFetchAllOk){
      localStorage.setItem(_hubLsid, String(Date.now()));

    }else{
      skipGcalIndicatorUpdate=true;
      if(_hubLbl){
        _hubLbl.textContent='Sincronização parcial — alguns dados podem estar desatualizados';

    rendTodaySummary(); rendCal();
    const label=document.getElementById('hub-sync-label');
    if(label){label.textContent='Erro na sincronização — mostrando dados em cache';label.style.color='var(--amber)';}
  }
  hubBootstrapGcal({skipIndicatorUpdate:skipGcalIndicatorUpdate});
}

async function hubBootstrapGcal(opts){
  opts=opts||{};
  const token=localStorage.getItem(AUTH_KEY);
  if(!token)return;
  try{
    const r=await fetch(`${getApiBase()}/google/events`,{headers:{Authorization:'Bearer '+token},cache:'no-store'});
    if(!r.ok)return;
    const events=await r.json();
    if(Array.isArray(events)){
      _lsSet('hub_gcal_events',JSON.stringify(events));
      rendTodaySummary(); rendCal();
      if(!opts.skipIndicatorUpdate)updateHubSyncIndicator();
    }
  }catch(e){console.warn('GCal bootstrap:',e);}
}

function getUserId(){ return localStorage.getItem('hub_user_id')||''; }
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function sortT(arr,field){return [...arr].sort((a,b)=>(a[field]||'').localeCompare(b[field]||''));}
function loadGoogleEvents(){ try{return JSON.parse(_lsGet('hub_gcal_events')||'[]');}catch{return [];} }
function getArchivedHabits(){ try{return new Set(JSON.parse(_lsGet('habitos_archived_v1')||'[]'));}catch{return new Set();} }
function getDayData(dateStr){
  const allTxs=loadTxs();
  const txs=allTxs.filter(t=>t.data===dateStr&&t.tipo!=='receita');
  const receitas=allTxs.filter(t=>t.data===dateStr&&t.tipo==='receita');
  const despesas=txs.filter(t=>t.valorParcela==null);
  const parcelados=txs.filter(t=>t.valorParcela!=null);
  const treinos=sortT(loadTreinos().filter(t=>t.data===dateStr&&!t.planejado&&!t.naoFeito),'hora_inicio');
  const treinosPlanejados=sortT(loadTreinos().filter(t=>t.data===dateStr&&t.planejado&&!t.naoFeito),'hora_inicio');
  const todayStr2=ds(new Date());
  const isToday2=dateStr===todayStr2;
  const allTarefas=loadTarefas();
  const tarefas=sortT(allTarefas.filter(t=>{
    if(t.status==='adiada')return false;
    if(t.status==='concluida')return(t.dataConclusao||'').slice(0,10)===dateStr; // show done ones on their completion day
    if(t.dataVenc===dateStr)return true;
    if(isToday2&&(t.status==='atrasada'||t.status==='hoje'))return true;
    return false;
  }),'horario');
  const saude=loadSaude();
  const pesos=( saude.weights||[]).filter(w=>(w.date||'').slice(0,10)===dateStr);
  const exames=(saude.exams||[]).filter(e=>(e.date||'').slice(0,10)===dateStr);
  const consultas=sortT((saude.consults||[]).filter(c=>(c.date||'').slice(0,10)===dateStr),'time');
  const todosHabitos=loadHabitos();
  const archivedIds=getArchivedHabits();
  const habitosPlanned=todosHabitos.filter(h=>!archivedIds.has(h.id)&&hubIsPlannedForDate(h,dateStr));
  const habitosFeitos=habitosPlanned.filter(h=>h.logs&&h.logs[dateStr]);
  const habitosAtivos=todosHabitos.filter(h=>!archivedIds.has(h.id));
  const refeicoes=sortT(loadAlimentacao().filter(m=>m.date===dateStr),'time');
  const planSlots=getMealPlanForDate(dateStr);
  const gcalEvents=sortT(loadGoogleEvents().filter(e=>e.date===dateStr),'time');
  return{txs,receitas,despesas,parcelados,treinos,treinosPlanejados,tarefas,pesos,exames,consultas,habitosFeitos,habitosPlanned,habitosAtivos,refeicoes,planSlots,gcalEvents};
}

let calFilter='todos';
function setFilter(f,el){ calFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); rendCal(); rendTodaySummary(); }
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let calRef=new Date();
function calNav(n){calRef.setMonth(calRef.getMonth()+n);rendCal();}
function calHoje(){calRef=new Date();rendCal();}
const _ci=(src,s=10)=>`<img src="${src}" style="width:${s}px;height:${s}px;object-fit:contain;vertical-align:middle;margin-right:3px;" alt="">`;
const _MI={fin:'assets/Finanças.png',ex:'assets/Exercício.png',cas:'assets/Casinha.png',sau:'assets/Saúde.png',hab:'assets/Hábitos.png',ali:'assets/Alimentação.png'};

function rendCal(){
  const y=calRef.getFullYear(),m=calRef.getMonth();
  document.getElementById('cal-label').textContent=MESES[m]+' '+y;
  const first=new Date(y,m,1); const last=new Date(y,m+1,0); const todayStr=ds(new Date());
  let days=[]; for(let i=0;i<first.getDay();i++)days.push({date:null});
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(y,m,d); const dateStr=ds(dt);
    const data=getDayData(dateStr);
    days.push({date:dt,dateStr,...data});
  }
  const body=document.getElementById('cal-body');
  try{
  body.innerHTML=days.map(day=>{
    if(!day.date)return`<div></div>`;
    const isToday=day.dateStr===todayStr;
    const dots=[];
    const f=calFilter;
    if(f==='todos'||f==='fin'){
      if(day.receitas.length){const r=day.receitas.reduce((a,t)=>a+Number(t.valor),0);dots.push(`<div class="cal-dot fin">${_ci('assets/Finanças.png')}+ <span class="sensitive">${fmt(r)}</span></div>`);}
      if(day.despesas.length){const d=day.despesas.reduce((a,t)=>a+Number(t.valor),0);dots.push(`<div class="cal-dot fin desp">${_ci('assets/Finanças.png')}- <span class="sensitive">${fmt(d)}</span></div>`);}
      if(day.parcelados.length){const p=day.parcelados.reduce((a,t)=>a+Number(t.valorParcela),0);dots.push(`<div class="cal-dot fin par">${_ci('assets/Finanças.png')}- <span class="sensitive">${fmt(p)}</span></div>`);}
    }
    if(f==='todos'||f==='ex'){
      if(day.treinos.length)dots.push(`<div class="cal-dot ex">${_ci('assets/Exercício.png')} ${day.treinos.length} treino${day.treinos.length!==1?'s':''}</div>`);
      if(day.treinosPlanejados.length)dots.push(`<div class="cal-dot ex" style="opacity:.6;border-style:dashed;">${_ci('assets/Exercício.png')} ${day.treinosPlanejados.length} planejado${day.treinosPlanejados.length!==1?'s':''}</div>`);
    }
    if((f==='todos'||f==='cas')&&day.tarefas.length){dots.push(`<div class="cal-dot cas">${_ci('assets/Casinha.png')} ${day.tarefas.length} tarefa${day.tarefas.length!==1?'s':''}</div>`);}
    if((f==='todos'||f==='sau')&&(day.pesos.length||day.consultas.length||day.exames.length)){const parts=[];if(day.pesos.length)parts.push(day.pesos[0].weight?`<span class="sensitive">${day.pesos[0].weight}kg</span>`:'Peso');if(day.consultas.length)parts.push(`${day.consultas.length} consulta${day.consultas.length!==1?'s':''}`);dots.push(`<div class="cal-dot sau">${_ci('assets/Saúde.png')} ${parts.join(' · ')}</div>`);}
    if((f==='todos'||f==='hab')&&day.habitosPlanned.length){dots.push(`<div class="cal-dot hab">${_ci('assets/Hábitos.png')} ${day.habitosFeitos.length}/${day.habitosPlanned.length} hábito${day.habitosFeitos.length!==1?'s':''}</div>`);}
    if((f==='todos'||f==='ali')&&day.refeicoes.length){const kcal=day.refeicoes.reduce((a,r)=>a+Number(r.calories||0),0);dots.push(`<div class="cal-dot ali">${_ci('assets/Alimentação.png')} ${day.refeicoes.length} ref${kcal?` · ${fmtNum(kcal)} kcal`:''}</div>`);}
    if((f==='todos'||f==='gcal')&&day.gcalEvents.length){dots.push(`<div class="cal-dot gcal">📅 ${day.gcalEvents.length} evento${day.gcalEvents.length!==1?'s':''}</div>`);}
    const hasData=dots.length>0;
    const MAX=4; const visible=dots.slice(0,MAX); const extra=dots.length>MAX?`<div class="cal-more">+${dots.length-MAX} mais</div>`:'';
    return`<div class="cal-day${isToday?' today':''}${hasData?' has-data':''}" onclick="openDay('${day.dateStr}')"><div class="cal-day-num">${day.date.getDate()}</div><div class="cal-dots">${visible.join('')}${extra}</div></div>`;
  }).join('');
  }catch(e){ console.error('[Hub] rendCal erro:',e); }
}

// ── HUB ACTIONS — confiabilidade crítica ────────────────────────────────────
// Fila serializa todas as ações: sem race conditions entre cliques rápidos.
// Snapshot é lido como string bruta do localStorage na hora da execução.
// Rollback restaura a string exata — nenhuma mutação por referência possível.
// _hubPost: em falha de fetch, lança erro com .network=true (não fazer rollback otimista).
let _hubActionQueue=Promise.resolve();
let _hubPending=0;
function _hubRun(fn){
  _hubPending++;
  _hubActionQueue=_hubActionQueue
    .then(()=>Promise.resolve().then(()=>fn()).catch(e=>console.error('[Hub] erro não tratado na fila:',e)))
    .finally(()=>{_hubPending--;});
}
function _hubMarkModuleDirty(queueKey,id){
  if(!id)return;
  const u=localStorage.getItem('hub_user_id')||'anon';
  const storageKey='u_'+u+'_'+queueKey;
  try{
    const s=new Set(JSON.parse(localStorage.getItem(storageKey)||'[]'));
    s.add(String(id));
    localStorage.setItem(storageKey,JSON.stringify([...s]));
  }catch(e){console.warn('[Hub] fila dirty:',queueKey,id,e);}
}
async function _hubPost(path,body){
  const token=localStorage.getItem(AUTH_KEY);
  const uid=localStorage.getItem('hub_user_id');
  if(!token) throw new Error('[Hub] _hubPost: sem token de autenticação');
  if(!uid)   throw new Error('[Hub] _hubPost: sem hub_user_id');
  let r;
  try{
    r=await fetch(getApiBase()+path,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify(body),
    });
  }catch(_e){
    const err=new Error('[Hub] Falha de rede em '+path);
    err.network=true;
    throw err;
  }
  if(!r.ok){
    const detail=await r.text().catch(()=>'');
    throw new Error(`[Hub] _hubPost: HTTP ${r.status} em ${path} — ${detail}`);
  }
}

// hubSyncHabito — usa _hubPost (mesma semântica de rede / HTTP)
async function hubSyncHabito(h){
  const uid=localStorage.getItem('hub_user_id');
  if(!localStorage.getItem(AUTH_KEY)||!uid) throw new Error('[Hub] hubSyncHabito: sem autenticação');
  await _hubPost('/habitos',{
    usuario_id:uid,client_id:h.id,nome:h.name,icone:h.icon||null,
    categoria:h.cat||null,frequencia:h.freq||null,weekdays:h.weekdays||[],
    monthDay:h.freq==='mensal'?(Number(h.monthDay)||1):null,
    obs:h.note||null,autoType:h.autoType||null,autoKeyword:h.autoKeyword||null,
    tipo:h.tipo||'check',unit:h.unit||null,startDate:h.startDate||null,
    logs:h.logs||{},
  });
}

let _controleState={id:null,dateStr:null};
function hubToggleHabito(id,dateStr){
  // Verificação síncrona de tipo antes de entrar na fila
  const check=loadHabitos().find(x=>x.id===id);
  if(!check) return;
  if(!hubIsPlannedForDate(check,dateStr)) return;
  if(check.tipo==='controle'){ _openControleModal(check,dateStr); return; }
  _hubRun(async()=>{
    // 1. Snapshot completo como string bruta (imune a mutação por referência)
    const snapshot=_lsGet('habitos_app_v5')||'[]';
    // 2. Parse fresco para aplicar o update
    const cur=JSON.parse(snapshot);
    const hab=cur.find(x=>x.id===id);
    if(!hab) return;
    if(!hab.logs) hab.logs={};
    const wasSet=!!hab.logs[dateStr];
    // 3. Update otimista
    if(wasSet) delete hab.logs[dateStr]; else hab.logs[dateStr]=true;
    _lsSet('habitos_app_v5',JSON.stringify(cur));
    rendTodaySummary(); rendCal();
    // 4. API com await obrigatório — lança em qualquer falha
    try{
      const uid=localStorage.getItem('hub_user_id');
      await _hubPost('/habitos',{
        usuario_id:uid,client_id:hab.id,nome:hab.name,icone:hab.icon||null,
        categoria:hab.cat||null,frequencia:hab.freq||null,weekdays:hab.weekdays||[],
        monthDay:hab.freq==='mensal'?(Number(hab.monthDay)||1):null,
        obs:hab.note||null,autoType:hab.autoType||null,autoKeyword:hab.autoKeyword||null,
        tipo:hab.tipo||'check',unit:hab.unit||null,startDate:hab.startDate||null,
        logs:hab.logs||{},
      });
    }catch(err){
      if(err.network){
        console.warn('[Hub] hubToggleHabito — falha de rede, estado local mantido; retentará no módulo:',hab.id,err);
        _hubMarkModuleDirty('habitos_dirty_v1',hab.id);
      }else{
        console.error('[Hub] hubToggleHabito — rollback:',err.message);
        _lsSet('habitos_app_v5',snapshot);
        rendTodaySummary(); rendCal();
      }
    }
  });
}

      {key:'diario',     label:'Diário',      filter:h=>!h.autoType&&h.tipo!=='controle'&&(h.freq==='diario'||!h.freq||h.freq==='livre')},

  }
  if(f==='todos'||f==='fin'){
    receitas.forEach(t=>item(null,'var(--green)',t.descricao,t.categoria||'',`+ <span class="sensitive">${fmt(t.valor)}</span>`,'green',{module:'financas.html'}));
    despesas.forEach(t=>item(null,'var(--red)',t.descricao,t.categoria||'',`- <span class="sensitive">${fmt(t.valor)}</span>`,'red',{module:'financas.html'}));
    parcelados.forEach(t=>item(null,'var(--fin-c)',t.descricao,t.categoria||'',`- <span class="sensitive">${fmt(t.valorParcela)}</span>`,'amber',{module:'financas.html'}));
  }
  if(f==='todos'||f==='gcal'){
    gcalEvents.forEach(e=>{
      const timeStr=e.time?`${e.time}${e.endTime?' – '+e.endTime:''}`:e.allDay?'dia inteiro':'';
      item(e.time||null,'var(--gcal-c)',e.title,'',timeStr,'muted',{externalUrl:e.meetUrl||e.htmlLink||null});
    });
  }

  // Ordena: com hora primeiro (cronológico), sem hora depois
  const comHora=items.filter(i=>i.time).sort((a,b)=>a.time.localeCompare(b.time));
  const semHora=items.filter(i=>!i.time);

  const MODULE_ICONS={'exercicios.html':'assets/Exercício.png','casinha.html':'assets/Casinha.png','Alimentacao.html':'assets/Alimentação.png','Saude.html':'assets/Saúde.png','financas.html':'assets/Finanças.png','habitos.html':'assets/Hábitos.png'};
  function renderItem(i){
    const cls='td-item'+(i.planned?' planned':'')+(i.done?' td-item-done':'')+((i.module||i.externalUrl)?' td-item-link':'');
    const clickAttr=i.externalUrl?`onclick="window.open('${i.externalUrl}','_blank','noopener')"`:i.module?`onclick="window.location='${i.module}'"` : '';
    const badge=i.planned?`<span class="td-item-planned-badge">Planejado</span>`:'';
    const checkBtn=i.checkFn&&i.id?`<button class="td-check-btn" onclick="event.stopPropagation();${i.checkFn}('${i.id}')" title="Marcar como concluído"><i class="bi bi-check-lg"></i></button>`:'';
    const modIcon=MODULE_ICONS[i.module];
    const dotHtml=modIcon
      ?`<img src="${modIcon}" class="td-item-mod-icon" style="${i.done?'opacity:.3':''}" alt="">`
      :`<span class="td-item-dot" style="background:${i.dot};${i.done?'opacity:.4':''}"></span>`;
    return`<div class="${cls}" ${clickAttr}>
      ${i.time?`<span class="td-item-time">${i.time}</span>`:'<span class="td-item-time"></span>'}
      ${dotHtml}
      <span class="td-item-name" style="${i.done?'opacity:.5;text-decoration:line-through':''}">${i.name}${i.hint?` <span class="td-item-hint">· ${i.hint}</span>`:''}</span>
      ${badge}
      ${i.val?`<span class="td-val ${i.valCls}">${i.val}</span>`:''}
      ${checkBtn}
    </div>`;
  }

  const hasItems=comHora.length||semHora.length;
  let itemsHtml='';
  if(comHora.length) itemsHtml+=comHora.map(renderItem).join('');
  if(comHora.length&&semHora.length) itemsHtml+=`<div class="td-divider"></div>`;
  if(semHora.length) itemsHtml+=semHora.map(renderItem).join('');

  const body=(habHtml||hasItems)
    ? habHtml+itemsHtml
    : `<div style="text-align:center;padding:20px 0;color:var(--hint);font-size:13px;">${f!=='todos'?'Nenhum dado registrado neste módulo.':'Nenhum dado registrado.'}</div>`;
  try{ el.innerHTML=`<div class="today-card">${nav}${body}</div>`; }catch(e){ console.error('[Hub] rendTodaySummary erro:',e); }
}

// ── PROFILE ─────────────────────────────────────────────────────────────────
let profileData = { nome: '', email: '' };

async function loadProfileData(){
  const token = localStorage.getItem(AUTH_KEY);
  if(!token) return;
  try{
    const r = await fetch(`${getApiBase()}/auth/me`, { headers: { Authorization: 'Bearer '+token } });
    if(r.status===401||r.status===403){
      localStorage.removeItem(AUTH_KEY);
      document.getElementById('auth-overlay').classList.add('open');
      return;
    }
    if(!r.ok) return;
    const { user } = await r.json();
    profileData = { nome: user.nome||'', email: user.email||'' };
    localStorage.setItem('hub_user_nome', user.nome||'');
    updateProfileUI();
  }catch(e){}
  checkGcalStatus();
}

function updateProfileUI(){
  const initials = (profileData.nome||'?').trim().split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const btn = document.getElementById('btn-profile');
  if(btn) btn.textContent = initials||'?';
  document.getElementById('profile-avatar-big').textContent = initials||'?';
  document.getElementById('profile-header-name').textContent = profileData.nome||'—';
  document.getElementById('profile-header-email').textContent = profileData.email||'—';
  document.getElementById('pf-nome').value = profileData.nome||'';
  document.getElementById('pf-email').value = profileData.email||'';
}

let _profileDirty=false;
function _profileDirtyGuard(){
  if(_profileDirty&&!confirm('Deseja abandonar as alterações?\nAs informações não serão salvas.')){return;}
  closeProfile();
}
function openProfile(){
  document.getElementById('pf-msg').textContent = '';
  document.getElementById('pf-pass-msg').textContent = '';
  document.getElementById('pf-senha-atual').value = '';
  document.getElementById('pf-senha-nova').value = '';
  document.getElementById('pf-senha-conf').value = '';
  updateProfileUI();
  _profileDirty=false;
  document.getElementById('profile-overlay').classList.add('open');
}
function closeProfile(){ _profileDirty=false; document.getElementById('profile-overlay').classList.remove('open'); }

function setMsg(id, text, ok){
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'profile-msg ' + (ok ? 'ok' : 'err');
}

async function saveProfile(){
  const token = localStorage.getItem(AUTH_KEY);
  if(!token) return;
  const nome = document.getElementById('pf-nome').value.trim();
  const email = document.getElementById('pf-email').value.trim();
  if(!nome || !email){ setMsg('pf-msg','Preencha nome e e-mail.',false); return; }
  try{
    const r = await fetch(`${getApiBase()}/auth/profile`, {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token },
      body: JSON.stringify({ nome, email }),
    });
    let data = {}; try{ data = await r.json(); }catch(_){}
    if(!r.ok){
      const map = { EMAIL_ALREADY_EXISTS: 'Este e-mail já está em uso.', INVALID_INPUT: 'Dados inválidos.' };
      setMsg('pf-msg', map[data.error] || data.error || 'Erro ao salvar.', false);
      return;
    }
    profileData = { nome: data.user.nome, email: data.user.email };
    localStorage.setItem('hub_user_nome', data.user.nome||'');
    updateProfileUI();
    setMsg('pf-msg','Dados salvos com sucesso!', true);
  }catch(e){ setMsg('pf-msg','Erro ao conectar à API.',false); }
}

async function changePassword(){
  const token = localStorage.getItem(AUTH_KEY);
  if(!token) return;
  const senhaAtual = document.getElementById('pf-senha-atual').value;
  const novaSenha = document.getElementById('pf-senha-nova').value;
  const conf = document.getElementById('pf-senha-conf').value;
  if(!senhaAtual || !novaSenha){ setMsg('pf-pass-msg','Preencha todos os campos.',false); return; }
  if(novaSenha.length < 4){ setMsg('pf-pass-msg','Nova senha precisa ter ao menos 4 caracteres.',false); return; }
  if(novaSenha !== conf){ setMsg('pf-pass-msg','As senhas não coincidem.',false); return; }
  try{
    const r = await fetch(`${getApiBase()}/auth/change-password`, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer '+token },
      body: JSON.stringify({ senhaAtual, novaSenha }),
    });
    let data = {}; try{ data = await r.json(); }catch(_){}
    if(!r.ok){
      const map = { WRONG_PASSWORD: 'Senha atual incorreta.', INVALID_INPUT: 'Dados inválidos.' };
      setMsg('pf-pass-msg', map[data.error] || data.error || 'Erro ao alterar senha.', false);
      return;
    }
    document.getElementById('pf-senha-atual').value = '';
    document.getElementById('pf-senha-nova').value = '';
    document.getElementById('pf-senha-conf').value = '';
    setMsg('pf-pass-msg','Senha alterada com sucesso!', true);
  }catch(e){ setMsg('pf-pass-msg','Erro ao conectar à API.',false); }
}

setAuthMode('login');
applyPrivacy();
updateHubSyncIndicator();
rendTodaySummary();
rendCal();
document.querySelector('#profile-overlay .profile-modal').addEventListener('input',()=>_profileDirty=true);

// ── Handle Google OAuth callback ────────────────────────────────────────────
(async function handleGcalCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(!code)return;
  // Clean URL immediately
  const clean=window.location.pathname;
  window.history.replaceState({},'',clean);
  const token=localStorage.getItem(AUTH_KEY);
  if(!token)return;
  try{
    const r=await fetch(`${getApiBase()}/google/exchange-token`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({code}),
    });
    if(r.ok){
      updateGcalUI(true);
      hubBootstrapGcal();
    }else{
      const d=await r.json().catch(()=>({}));
      console.warn('GCal exchange error:',d);
    }
  }catch(e){console.warn('GCal exchange error:',e);}
})();

if(!localStorage.getItem(AUTH_KEY)){ document.getElementById('auth-overlay').classList.add('open'); } else { const _sn=localStorage.getItem('hub_user_nome'); if(_sn){profileData.nome=_sn;updateProfileUI();} fetchFinancas(); hubBootstrap().finally(()=>loadProfileData()); }

window.addEventListener('beforeunload',function(e){
  if(typeof _hubPending==='number'&&_hubPending>0){
    e.preventDefault();
    e.returnValue='O hub ainda está salvando alterações.';
    return e.returnValue;
  }
});
